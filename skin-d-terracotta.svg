<svg xmlns="http://www.w3.org/2000/svg" width="390" height="1400" viewBox="0 0 390 1400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', sans-serif; }
  </style>

  <rect width="390" height="1400" fill="#f8f8d6"/>

  <!-- === HEADER === -->
  <rect x="0" y="0" width="390" height="48" fill="#FFFFFF" opacity="0.9"/>
  <text x="58" y="30" font-size="9" fill="#6B5C52">Каталог</text>
  <text x="118" y="30" font-size="9" fill="#6B5C52">О бренде</text>
  <text x="195" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#2B2521" letter-spacing="1.5">TANSYLATE</text>
  <text x="268" y="30" font-size="8" fill="#6B5C52">Оплата и доставка</text>
  <text x="356" y="30" font-size="9" fill="#6B5C52">Контакты</text>

  <!-- === HERO === -->
  <text x="195" y="95" text-anchor="middle" font-size="9" fill="#A0755A" letter-spacing="3" font-weight="500">ОСНОВАНО В 2026</text>
  <text x="195" y="130" text-anchor="middle" font-size="24" font-weight="700" fill="#2B2521">История в двух цветах</text>
  <text x="195" y="155" text-anchor="middle" font-size="12" fill="#6B5C52">Одежда, в которой ты разный</text>
  <rect x="145" y="170" width="100" height="36" rx="8" fill="#2B2521"/>
  <text x="195" y="193" text-anchor="middle" font-size="10" fill="#f8f8d6" font-weight="600">КАТАЛОГ</text>

  <!-- === LABEL === -->
  <text x="195" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#2B2521" letter-spacing="0.5">D. ТЁПЛЫЙ ЧЁРНЫЙ + ТЕРРАКОТ</text>
  <line x1="50" y1="258" x2="340" y2="258" stroke="#A0755A" stroke-width="0.5" opacity="0.4"/>

  <!-- === CATALOG === -->
  <text x="195" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#2B2521">Каталог</text>

  <!-- Card 1 -->
  <rect x="20" y="320" width="170" height="280" rx="12" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="1"/>
  <rect x="20" y="320" width="170" height="195" rx="12" fill="#EEE8D2"/>
  <rect x="20" y="503" width="170" height="12" rx="0" fill="#FFFFFF"/>
  <circle cx="167" cy="340" r="14" fill="#FFFFFF" opacity="0.9"/>
  <text x="167" y="344" text-anchor="middle" font-size="12" fill="#D4594F">♥</text>
  <text x="35" y="535" font-size="11" font-weight="600" fill="#2B2521">Спортивный костюм</text>
  <text x="35" y="550" font-size="8" fill="#A0755A">КОЛЛЕКЦИЯ 2026</text>
  <text x="35" y="568" font-size="11" fill="#2B2521">12 990 ₽</text>
  <rect x="30" y="576" width="150" height="28" rx="6" fill="#A0755A"/>
  <text x="105" y="594" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="600">В КОРЗИНУ</text>

  <!-- Card 2 -->
  <rect x="200" y="320" width="170" height="280" rx="12" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="1"/>
  <rect x="200" y="320" width="170" height="195" rx="12" fill="#EEE8D2"/>
  <rect x="200" y="503" width="170" height="12" rx="0" fill="#FFFFFF"/>
  <circle cx="347" cy="340" r="14" fill="#FFFFFF" opacity="0.9"/>
  <text x="347" y="344" text-anchor="middle" font-size="12" fill="#aaa">♡</text>
  <text x="215" y="535" font-size="11" font-weight="600" fill="#2B2521">Худи</text>
  <text x="215" y="550" font-size="8" fill="#A0755A">БАЗОВАЯ КОЛЛЕКЦИЯ</text>
  <text x="215" y="568" font-size="11" fill="#2B2521">5 490 ₽</text>
  <rect x="210" y="576" width="150" height="28" rx="6" fill="#A0755A"/>
  <text x="285" y="594" text-anchor="middle" font-size="9" fill="#FFFFFF" font-weight="600">В КОРЗИНУ</text>

  <!-- === ABOUT === -->
  <rect x="0" y="630" width="390" height="280" fill="#EEE8D2"/>
  <rect x="200" y="645" width="175" height="250" rx="10" fill="#DDD5C0"/>
  <text x="30" y="680" font-size="18" font-weight="700" fill="#2B2521" font-style="italic">О бренде</text>
  <text x="30" y="705" font-size="9" fill="#6B5C52">Меня зовут Тансылу, мне 16 лет.</text>
  <text x="30" y="720" font-size="9" fill="#6B5C52">Моя цель — создавать настоящую</text>
  <text x="30" y="735" font-size="9" fill="#6B5C52">долговечную одежду.</text>
  <text x="30" y="760" font-size="9" fill="#6B5C52">Все ключевые этапы контролирую</text>
  <text x="30" y="775" font-size="9" fill="#6B5C52">лично: от разработки удобных</text>
  <text x="30" y="790" font-size="9" fill="#6B5C52">эскизов и работы с дизайнерами</text>
  <text x="30" y="805" font-size="9" fill="#6B5C52">до проверки швейного цеха.</text>

  <!-- === TRUST === -->
  <text x="195" y="950" text-anchor="middle" font-size="18" font-weight="700" fill="#2B2521">Почему нам верят</text>
  <circle cx="70" cy="990" r="22" fill="none" stroke="#A0755A" stroke-width="1.5"/>
  <text x="70" y="995" text-anchor="middle" font-size="14" fill="#A0755A">📦</text>
  <text x="70" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">Доставка</text>
  <text x="70" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">с примеркой</text>
  <circle cx="195" cy="990" r="22" fill="none" stroke="#A0755A" stroke-width="1.5"/>
  <text x="195" y="995" text-anchor="middle" font-size="14" fill="#A0755A">↻</text>
  <text x="195" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">Возврат</text>
  <text x="195" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">14 дней</text>
  <circle cx="320" cy="990" r="22" fill="none" stroke="#A0755A" stroke-width="1.5"/>
  <text x="320" y="995" text-anchor="middle" font-size="14" fill="#A0755A">✦</text>
  <text x="320" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">Премиальные</text>
  <text x="320" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#2B2521">материалы</text>

  <!-- === DELIVERY === -->
  <rect x="0" y="1070" width="390" height="160" fill="#EEE8D2"/>
  <text x="195" y="1100" text-anchor="middle" font-size="18" font-weight="700" fill="#2B2521">Доставка и возврат</text>
  <rect x="15" y="1115" width="175" height="100" rx="10" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="0.5"/>
  <text x="30" y="1138" font-size="11" font-weight="700" fill="#2B2521">Доставка</text>
  <text x="30" y="1158" font-size="8" fill="#6B5C52">• СДЭК / Почта России</text>
  <text x="30" y="1172" font-size="8" fill="#6B5C52">• 3–7 рабочих дней</text>
  <text x="30" y="1186" font-size="8" fill="#6B5C52">• Примерка перед оплатой</text>
  <rect x="200" y="1115" width="175" height="100" rx="10" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="0.5"/>
  <text x="215" y="1138" font-size="11" font-weight="700" fill="#2B2521">Возврат</text>
  <text x="215" y="1158" font-size="8" fill="#6B5C52">• Возврат в течение 14 дней</text>
  <text x="215" y="1172" font-size="8" fill="#6B5C52">• Бирки не срезаны</text>
  <text x="215" y="1186" font-size="8" fill="#6B5C52">• Нет следов носки</text>

  <!-- === FOOTER === -->
  <line x1="0" y1="1260" x2="390" y2="1260" stroke="#DDD5C0" stroke-width="1"/>
  <text x="30" y="1290" font-size="9" fill="#6B5C52" font-weight="600">КАТАЛОГ</text>
  <text x="30" y="1308" font-size="9" fill="#6B5C52" font-weight="600">О БРЕНДЕ</text>
  <text x="30" y="1326" font-size="9" fill="#6B5C52" font-weight="600">ОПЛАТА И ДОСТАВКА</text>
  <text x="250" y="1290" font-size="9" fill="#6B5C52" font-weight="600">TELEGRAM</text>
  <text x="250" y="1308" font-size="9" fill="#6B5C52" font-weight="600">INSTAGRAM</text>
  <text x="250" y="1326" font-size="9" fill="#6B5C52" font-weight="600">ТИКТОК</text>
  <line x1="195" y1="1275" x2="195" y2="1340" stroke="#DDD5C0" stroke-width="1"/>
  <text x="195" y="1380" text-anchor="middle" font-size="8" fill="#A0755A">© 2026 TANSYLATE. ВСЕ ПРАВА ЗАЩИЩЕНЫ.</text>
</svg>

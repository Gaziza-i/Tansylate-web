  <rect x="30" y="232" width="120" height="100" rx="8" fill="#EEE8D2"/>
  <rect x="165" y="232" width="120" height="100" rx="8" fill="#EEE8D2"/>
  <rect x="300" y="232" width="120" height="100" rx="8" fill="#EEE8D2"/>
  <text x="90" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Спортивный костюм</text>
  <text x="90" y="362" text-anchor="middle" font-size="7" fill="#6B5C52">12 990 ₽</text>
  <rect x="45" y="368" width="90" height="20" rx="4" fill="#A0755A"/>
  <text x="90" y="381" text-anchor="middle" font-size="7" fill="#FFFFFF">В КОРЗИНУ</text>
  <text x="225" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Худи</text>
  <text x="225" y="362" text-anchor="middle" font-size="7" fill="#6B5C52">5 490 ₽</text>
  <rect x="180" y="368" width="90" height="20" rx="4" fill="#A0755A"/>
  <text x="225" y="381" text-anchor="middle" font-size="7" fill="#FFFFFF">В КОРЗИНУ</text>
  <text x="360" y="350" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Футболка</text>
  <text x="360" y="362" text-anchor="middle" font-size="7" fill="#6B5C52">3 200 ₽</text>
  <rect x="315" y="368" width="90" height="20" rx="4" fill="#A0755A"/>
  <text x="360" y="381" text-anchor="middle" font-size="7" fill="#FFFFFF">В КОРЗИНУ</text>


  <circle cx="220" cy="590" r="18" fill="none" stroke="#A0755A" stroke-width="1.5"/>
  <text x="220" y="622" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Возврат 14 дней</text>
  <circle cx="350" cy="590" r="18" fill="none" stroke="#A0755A" stroke-width="1.5"/>
  <text x="350" y="622" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Премиальные материалы</text>


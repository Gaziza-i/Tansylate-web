<svg xmlns="http://www.w3.org/2000/svg" width="440" height="760" viewBox="0 0 440 760">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
    text { font-family: 'Inter', Arial, sans-serif; }
  </style>

  <rect width="440" height="760" fill="#f8f8d6" rx="12"/>
  <text x="220" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#2B2521">D. Тёплый чёрный + терракот</text>

  <!-- Header -->

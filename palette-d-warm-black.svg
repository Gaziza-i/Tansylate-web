  <text x="60" y="62" text-anchor="middle" font-size="8" fill="#6B5C52">Каталог</text>
  <text x="120" y="62" text-anchor="middle" font-size="8" fill="#6B5C52">О бренде</text>
  <text x="310" y="62" text-anchor="middle" font-size="8" fill="#6B5C52">Оплата и доставка</text>
  <text x="395" y="62" text-anchor="middle" font-size="8" fill="#6B5C52">Контакты</text>

  <!-- Hero -->
  <text x="220" y="108" text-anchor="middle" font-size="9" fill="#A0755A" letter-spacing="2">ОСНОВАНО В 2026</text>

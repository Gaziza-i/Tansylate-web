  <text x="30" y="425" font-size="14" font-weight="700" fill="#2B2521">О бренде</text>
  <text x="30" y="445" font-size="8" fill="#6B5C52">Меня зовут Тансылу, мне 16 лет.</text>
  <text x="30" y="458" font-size="8" fill="#6B5C52">Моя цель — создавать настоящую долговечную одежду.</text>
  <rect x="270" y="410" width="145" height="110" rx="6" fill="#DDD5C0"/>


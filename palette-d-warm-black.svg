  <line x1="10" y1="726" x2="430" y2="726" stroke="#DDD5C0" stroke-width="1"/>
  <text x="220" y="745" text-anchor="middle" font-size="7" fill="#6B5C52">© 2026 TANSYLATE. ВСЕ ПРАВА ЗАЩИЩЕНЫ.</text>

  <rect x="25" y="675" width="190" height="30" rx="6" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="0.5"/>
  <text x="120" y="694" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Доставка</text>
  <rect x="225" y="675" width="190" height="30" rx="6" fill="#FFFFFF" stroke="#DDD5C0" stroke-width="0.5"/>
  <text x="320" y="694" text-anchor="middle" font-size="8" font-weight="600" fill="#2B2521">Возврат</text>


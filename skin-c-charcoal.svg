<svg xmlns="http://www.w3.org/2000/svg" width="390" height="1400" viewBox="0 0 390 1400">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'Inter', sans-serif; }
  </style>

  <rect width="390" height="1400" fill="#f8f8d6"/>

  <!-- === HEADER === -->
  <rect x="0" y="0" width="390" height="48" fill="#FFFFFF" opacity="0.9"/>
  <text x="58" y="30" font-size="9" fill="#4A4A4A">Каталог</text>
  <text x="118" y="30" font-size="9" fill="#4A4A4A">О бренде</text>
  <text x="195" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1A1A1A" letter-spacing="1.5">TANSYLATE</text>
  <text x="268" y="30" font-size="8" fill="#4A4A4A">Оплата и доставка</text>
  <text x="356" y="30" font-size="9" fill="#4A4A4A">Контакты</text>

  <!-- === HERO === -->
  <text x="195" y="95" text-anchor="middle" font-size="9" fill="#6E6E5C" letter-spacing="3" font-weight="500">ОСНОВАНО В 2026</text>
  <text x="195" y="130" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">История в двух цветах</text>
  <text x="195" y="155" text-anchor="middle" font-size="12" fill="#4A4A4A">Одежда, в которой ты разный</text>
  <rect x="145" y="170" width="100" height="36" rx="8" fill="#1A1A1A"/>
  <text x="195" y="193" text-anchor="middle" font-size="10" fill="#f8f8d6" font-weight="600">КАТАЛОГ</text>

  <!-- === LABEL === -->
  <text x="195" y="250" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A1A" letter-spacing="0.5">C. ГРАФИТ</text>
  <line x1="100" y1="258" x2="290" y2="258" stroke="#6E6E5C" stroke-width="0.5" opacity="0.4"/>

  <!-- === CATALOG === -->
  <text x="195" y="300" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">Каталог</text>

  <!-- Card 1 -->
  <rect x="20" y="320" width="170" height="280" rx="12" fill="#FFFFFF" stroke="#DDDDB8" stroke-width="1"/>
  <rect x="20" y="320" width="170" height="195" rx="12" fill="#EDEDCC"/>
  <rect x="20" y="503" width="170" height="12" rx="0" fill="#FFFFFF"/>
  <circle cx="167" cy="340" r="14" fill="#FFFFFF" opacity="0.9"/>
  <text x="167" y="344" text-anchor="middle" font-size="12" fill="#D4594F">♥</text>
  <text x="35" y="535" font-size="11" font-weight="600" fill="#1A1A1A">Спортивный костюм</text>
  <text x="35" y="550" font-size="8" fill="#6E6E5C">КОЛЛЕКЦИЯ 2026</text>
  <text x="35" y="568" font-size="11" fill="#1A1A1A">12 990 ₽</text>
  <rect x="30" y="576" width="150" height="28" rx="6" fill="#1A1A1A"/>
  <text x="105" y="594" text-anchor="middle" font-size="9" fill="#f8f8d6" font-weight="600">В КОРЗИНУ</text>

  <!-- Card 2 -->
  <rect x="200" y="320" width="170" height="280" rx="12" fill="#FFFFFF" stroke="#DDDDB8" stroke-width="1"/>
  <rect x="200" y="320" width="170" height="195" rx="12" fill="#EDEDCC"/>
  <rect x="200" y="503" width="170" height="12" rx="0" fill="#FFFFFF"/>
  <circle cx="347" cy="340" r="14" fill="#FFFFFF" opacity="0.9"/>
  <text x="347" y="344" text-anchor="middle" font-size="12" fill="#aaa">♡</text>
  <text x="215" y="535" font-size="11" font-weight="600" fill="#1A1A1A">Худи</text>
  <text x="215" y="550" font-size="8" fill="#6E6E5C">БАЗОВАЯ КОЛЛЕКЦИЯ</text>
  <text x="215" y="568" font-size="11" fill="#1A1A1A">5 490 ₽</text>
  <rect x="210" y="576" width="150" height="28" rx="6" fill="#1A1A1A"/>
  <text x="285" y="594" text-anchor="middle" font-size="9" fill="#f8f8d6" font-weight="600">В КОРЗИНУ</text>

  <!-- === ABOUT === -->
  <rect x="0" y="630" width="390" height="280" fill="#EDEDCC"/>
  <rect x="200" y="645" width="175" height="250" rx="10" fill="#DDDDB8"/>
  <text x="30" y="680" font-size="18" font-weight="700" fill="#1A1A1A" font-style="italic">О бренде</text>
  <text x="30" y="705" font-size="9" fill="#4A4A4A">Меня зовут Тансылу, мне 16 лет.</text>
  <text x="30" y="720" font-size="9" fill="#4A4A4A">Моя цель — создавать настоящую</text>
  <text x="30" y="735" font-size="9" fill="#4A4A4A">долговечную одежду.</text>
  <text x="30" y="760" font-size="9" fill="#4A4A4A">Все ключевые этапы контролирую</text>
  <text x="30" y="775" font-size="9" fill="#4A4A4A">лично: от разработки удобных</text>
  <text x="30" y="790" font-size="9" fill="#4A4A4A">эскизов и работы с дизайнерами</text>
  <text x="30" y="805" font-size="9" fill="#4A4A4A">до проверки швейного цеха.</text>

  <!-- === TRUST === -->
  <text x="195" y="950" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">Почему нам верят</text>
  <circle cx="70" cy="990" r="22" fill="none" stroke="#6E6E5C" stroke-width="1.5"/>
  <text x="70" y="995" text-anchor="middle" font-size="14" fill="#6E6E5C">📦</text>
  <text x="70" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">Доставка</text>
  <text x="70" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">с примеркой</text>
  <circle cx="195" cy="990" r="22" fill="none" stroke="#6E6E5C" stroke-width="1.5"/>
  <text x="195" y="995" text-anchor="middle" font-size="14" fill="#6E6E5C">↻</text>
  <text x="195" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">Возврат</text>
  <text x="195" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">14 дней</text>
  <circle cx="320" cy="990" r="22" fill="none" stroke="#6E6E5C" stroke-width="1.5"/>
  <text x="320" y="995" text-anchor="middle" font-size="14" fill="#6E6E5C">✦</text>
  <text x="320" y="1028" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">Премиальные</text>
  <text x="320" y="1040" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A1A">материалы</text>

  <!-- === DELIVERY === -->
  <rect x="0" y="1070" width="390" height="160" fill="#EDEDCC"/>
  <text x="195" y="1100" text-anchor="middle" font-size="18" font-weight="700" fill="#1A1A1A">Доставка и возврат</text>
  <rect x="15" y="1115" width="175" height="100" rx="10" fill="#FFFFFF" stroke="#DDDDB8" stroke-width="0.5"/>
  <text x="30" y="1138" font-size="11" font-weight="700" fill="#1A1A1A">Доставка</text>
  <text x="30" y="1158" font-size="8" fill="#4A4A4A">• СДЭК / Почта России</text>
  <text x="30" y="1172" font-size="8" fill="#4A4A4A">• 3–7 рабочих дней</text>
  <text x="30" y="1186" font-size="8" fill="#4A4A4A">• Примерка перед оплатой</text>
  <rect x="200" y="1115" width="175" height="100" rx="10" fill="#FFFFFF" stroke="#DDDDB8" stroke-width="0.5"/>
  <text x="215" y="1138" font-size="11" font-weight="700" fill="#1A1A1A">Возврат</text>
  <text x="215" y="1158" font-size="8" fill="#4A4A4A">• Возврат в течение 14 дней</text>
  <text x="215" y="1172" font-size="8" fill="#4A4A4A">• Бирки не срезаны</text>
  <text x="215" y="1186" font-size="8" fill="#4A4A4A">• Нет следов носки</text>

  <!-- === FOOTER === -->
  <line x1="0" y1="1260" x2="390" y2="1260" stroke="#DDDDB8" stroke-width="1"/>
  <text x="30" y="1290" font-size="9" fill="#4A4A4A" font-weight="600">КАТАЛОГ</text>
  <text x="30" y="1308" font-size="9" fill="#4A4A4A" font-weight="600">О БРЕНДЕ</text>
  <text x="30" y="1326" font-size="9" fill="#4A4A4A" font-weight="600">ОПЛАТА И ДОСТАВКА</text>
  <text x="250" y="1290" font-size="9" fill="#4A4A4A" font-weight="600">TELEGRAM</text>
  <text x="250" y="1308" font-size="9" fill="#4A4A4A" font-weight="600">INSTAGRAM</text>
  <text x="250" y="1326" font-size="9" fill="#4A4A4A" font-weight="600">ТИКТОК</text>
  <line x1="195" y1="1275" x2="195" y2="1340" stroke="#DDDDB8" stroke-width="1"/>
  <text x="195" y="1380" text-anchor="middle" font-size="8" fill="#6E6E5C">© 2026 TANSYLATE. ВСЕ ПРАВА ЗАЩИЩЕНЫ.</text>
</svg>
